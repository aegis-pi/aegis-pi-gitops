name: Validate GitOps Manifests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Helm and YAML validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Helm lint factory-a
        run: helm lint charts/aegis-spoke -f envs/factory-a/values.yaml

      - name: Helm template factory-a
        run: helm template aegis-spoke charts/aegis-spoke -f envs/factory-a/values.yaml

      - name: Helm template factory-b
        run: helm template aegis-spoke charts/aegis-spoke -f envs/factory-b/values.yaml

      - name: Helm template factory-c
        run: helm template aegis-spoke charts/aegis-spoke -f envs/factory-c/values.yaml

      - name: Validate YAML syntax
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python - <<'PY'
          from pathlib import Path
          import yaml

          files = sorted(Path(".").rglob("*.yaml")) + sorted(Path(".").rglob("*.yml"))
          for path in files:
              if ".git" in path.parts:
                  continue
              with path.open("r", encoding="utf-8") as handle:
                  list(yaml.safe_load_all(handle))
              print(path)
          PY
