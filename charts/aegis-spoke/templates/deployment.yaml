{{- if .Values.smokeApp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.smokeApp.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "aegis-spoke.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.smokeApp.replicas }}
  progressDeadlineSeconds: {{ .Values.smokeApp.progressDeadlineSeconds }}
  strategy:
    type: {{ .Values.smokeApp.strategy.type }}
    {{- with .Values.smokeApp.strategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "aegis-spoke.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aegis-spoke.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.smokeApp.name }}
          image: "{{ .Values.smokeApp.image.repository }}:{{ .Values.smokeApp.image.tag }}"
          imagePullPolicy: {{ .Values.smokeApp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.smokeApp.containerPort }}
          resources:
            {{- toYaml .Values.smokeApp.resources | nindent 12 }}
{{- end }}
